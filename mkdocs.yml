site_name: Mes Cartes HA 🏠
site_url: https://maxence-csnt.github.io/Carte-Home-Assistant/
use_directory_urls: false

theme:
  name: material
  language: fr
  palette:
    scheme: slate
    primary: indigo
  features:
    - navigation.tabs
    - navigation.sections # Garde les titres de sections visibles
    - navigation.expand   # Garde les menus ouverts par défaut
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences

nav:
  - Accueil: index.md
      - 📊 Dashboard: dashboard.md
      - 🛠️ Automatisation: automatisation.md
  - 📊 Dashboard: 
      - Présentation: dashboard.md
      - Humidité 💦 (Graphique): humidite (graphique).md
      - Humidité 💦: humidite.md
      - Boîte aux lettres 📬: boite-aux-lettres.md
      - Température 🌡️ (Graphique): temperature (graphique).md
      - Température 🌡️: temperature.md  
  - 🛠️ Automatisation: 
      - Présentation: automatisation.md
      - Incendie 🔥: incendie.md
