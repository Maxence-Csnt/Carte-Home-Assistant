site_name: Mes Cartes Home Assistant
theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
  features:
    - navigation.tabs

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences

plugins:
  - search

nav:
  - Accueil: index.md
  - Automatisation:
      - Incendie 🔥: incendie.md
  - Dashboard:
      - Humidité 💦: humidite.md
      - Boîte aux lettres 📬: boite-aux-lettres.md
